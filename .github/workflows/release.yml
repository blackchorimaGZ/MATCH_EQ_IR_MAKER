name: Build and Release

on:
  push:
    tags:
      - 'v*' # Desencadena al crear una etiqueta como v1.0.0
  workflow_dispatch: # Permite lanzarlo manualmente desde la pestaña Actions

permissions:
  contents: write # Permite crear releases

jobs:
  build-all:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact_name: MATCH_EQ_IR_MAKER_Mac.zip
          - os: windows-latest
            platform: windows/amd64
            artifact_name: MATCH_EQ_IR_MAKER_Windows.zip
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: MATCH_EQ_IR_MAKER_Linux.zip

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential

      - name: Build Wails App
        working-directory: ./ir_maker
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            wails build -platform ${{ matrix.platform }} -clean -tags webkit2_41
          else
            wails build -platform ${{ matrix.platform }} -clean
          fi
        shell: bash

      - name: Package Release (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir out
          cp ir_maker/build/bin/ir_maker.exe out/MATCH_EQ_IR_MAKER.exe
          cp manual.html out/
          Compress-Archive -Path out/* -DestinationPath ${{ matrix.artifact_name }}
        shell: pwsh

      - name: Package Release (Mac)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir out
          cp -r ir_maker/build/bin/ir_maker.app out/MATCH_EQ_IR_MAKER.app
          cp manual.html out/
          zip -r ${{ matrix.artifact_name }} out/
        shell: bash

      - name: Package Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir out
          cp ir_maker/build/bin/ir_maker out/MATCH_EQ_IR_MAKER_Linux
          cp manual.html out/
          zip -r ${{ matrix.artifact_name }} out/
        shell: bash

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
